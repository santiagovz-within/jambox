name: JamBox Daily Pipeline Orchestrator

on:
  # Runs automatically at 10:00 AM Central Time (16:00 UTC) every day
  schedule:
    - cron: '0 16 * * *'
  
  # Allows you to manually click "Run workflow" from the GitHub UI natively
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Trigger JamBox AI Pipeline
        run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
